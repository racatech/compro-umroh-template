<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nav Links Keren</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      font-family: 'DM Mono', monospace;
      background: #0a0a0a;
      min-height: 340px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 3.5rem;
      position: relative;
      overflow: hidden;
      width: 100%;
      max-width: 600px;
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;
    }

    .nav-item {
      border-top: 0.5px solid #1e1e1e;
    }
    .nav-item:last-child {
      border-bottom: 0.5px solid #1e1e1e;
    }

    .nav-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 0;
      text-decoration: none;
      color: #888;
      font-size: 13px;
      letter-spacing: 0.05em;
      transition: color 0.2s ease, padding-left 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .nav-link::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0;
      background: rgba(255,255,255,0.03);
      transition: width 0.3s ease;
    }

    .nav-link:hover::before {
      width: 100%;
    }

    .nav-link:hover {
      color: #f0f0f0;
      padding-left: 12px;
    }

    .nav-link:hover .arrow {
      transform: translateX(4px);
      color: #f0f0f0;
    }

    .link-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .num {
      font-size: 10px;
      color: #333;
      transition: color 0.2s;
      font-variant-numeric: tabular-nums;
    }

    .nav-link:hover .num {
      color: #666;
    }

    .title {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0;
      transition: color 0.2s;
    }

    .arrow {
      font-size: 12px;
      color: #333;
      transition: transform 0.25s ease, color 0.2s;
      font-family: 'DM Mono', monospace;
      font-style: normal;
    }

    #active-bg {
      position: absolute;
      font-family: 'Fraunces', serif;
      font-size: 200px;
      font-weight: 300;
      color: rgba(255,255,255,0.03);
      right: -10px;
      bottom: -30px;
      line-height: 1;
      pointer-events: none;
      font-style: italic;
      user-select: none;
      transition: opacity 0.3s ease;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <p class="label">navigasi</p>
    <ul class="nav-list">
      <li class="nav-item">
        <a href="/v1.html" class="nav-link" data-num="01">
          <span class="link-left">
            <span class="num">01</span>
            <span class="title">Contoh 1</span>
          </span>
          <span class="arrow">→</span>
        </a>
      </li>
      <li class="nav-item">
        <a href="/v2.html" class="nav-link" data-num="02">
          <span class="link-left">
            <span class="num">02</span>
            <span class="title">Contoh 2</span>
          </span>
          <span class="arrow">→</span>
        </a>
      </li>
      <li class="nav-item">
        <a href="/v3.html" class="nav-link" data-num="03">
          <span class="link-left">
            <span class="num">03</span>
            <span class="title">Contoh 3</span>
          </span>
          <span class="arrow">→</span>
        </a>
      </li>
      <li class="nav-item">
        <a href="/v4.html" class="nav-link" data-num="04">
          <span class="link-left">
            <span class="num">04</span>
            <span class="title">Contoh 4</span>
          </span>
          <span class="arrow">→</span>
        </a>
      </li>
    </ul>
    <div id="active-bg"></div>
  </div>

  <script>
    const links = document.querySelectorAll('.nav-link');
    const bg = document.getElementById('active-bg');

    links.forEach(link => {
      link.addEventListener('mouseenter', () => {
        bg.textContent = link.dataset.num;
        bg.style.opacity = '1';
      });
      link.addEventListener('mouseleave', () => {
        bg.style.opacity = '0';
      });
    });

    const items = document.querySelectorAll('.nav-item');
    items.forEach((item, i) => {
      item.style.opacity = '0';
      item.style.transform = 'translateY(8px)';
      item.style.transition = `opacity 0.4s ease ${i * 0.08}s, transform 0.4s ease ${i * 0.08}s`;
      setTimeout(() => {
        item.style.opacity = '1';
        item.style.transform = 'translateY(0)';
      }, 50);
    });
  </script>
</body>
</html>
